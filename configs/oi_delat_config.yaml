# OI Delta Signal Configuration
# Owner: [Your Name]
# Component: Signal #2 - Family A

signal:
  name: "oi_delta"
  family: "A"
  timeframe: "4h"
  weight: 1.0  # 1/7 in full scoring system

parameters:
  # Threshold for "significant" OI change
  threshold_up: 2.0      # OI increase > 2% is significant
  threshold_down: -2.0   # OI decrease < -2% is significant
  
  # Normalization method
  use_zscore: true       # Recommended: true for adaptive thresholds
  zscore_window: 360     # 60 days * 6 (4H candles per day)
  
  # Alternative: raw percentage thresholds
  # use_zscore: false
  # threshold_up: 3.0
  # threshold_down: -3.0

# Expected data format
input:
  required_columns:
    - timestamp
    - close
    - oi_btc
  
  data_frequency: "4h"
  min_history: 360  # Candles (for Z-score window)

# Output format
output:
  columns:
    - oi_delta_pct        # Percentage change in OI
    - oi_delta_abs        # Absolute change in OI
    - oi_delta_zscore     # Z-score (if enabled)
    - oi_delta_value      # Value used for thresholding
    - oi_delta_signal     # Classification (BULLISH/BEARISH/etc)
    - oi_delta_score      # Numeric score (-1, 0, 1)
  
  signal_types:
    - BULLISH         # Score: +1
    - BEARISH         # Score: -1
    - WEAK_BULLISH    # Score: 0
    - CAPITULATION    # Score: 0
    - NEUTRAL         # Score: 0